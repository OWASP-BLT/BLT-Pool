name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker + Apply D1 Migrations

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Check no runtime DDL in source
        run: bash scripts/check_no_runtime_ddl.sh

      # ── Step 1: Apply D1 migrations BEFORE deploying the worker ──────────
      # This ensures tables exist before the new worker code goes live.
      # Deploying the worker first on a fresh D1 instance would cause
      # immediate failures on all table-dependent operations.
      - name: Apply D1 migrations
        run: wrangler d1 migrations apply LEADERBOARD_DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── Step 2: Deploy the worker AFTER migrations succeed ───────────────
      - name: Deploy worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
